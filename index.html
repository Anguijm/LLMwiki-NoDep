                  App.announce(STRINGS.indexSkipped);
                  App._showApp();
                  await App._scanAndRender();
                  return;
                }
              } catch (err) {
                /* fall through */
              }
            }
          }
        },

        _onRescan: async function () {
          if (!App._dirHandle) return;

          // Verify handle is still valid
          try {
            var perm = await App._dirHandle.queryPermission({ mode: 'read' });
            if (perm !== 'granted') {
              perm = await App._dirHandle.requestPermission({ mode: 'read' });
              if (perm !== 'granted') {
                App.announce(STRINGS.permRevoked);
                return;
              }
            }
          } catch (e) {
            App.announce(STRINGS.permRevoked);
            return;
          }

          await App._scanAndRender();

          // Regenerate _index.md if writable
          if (App._isWritable && App._dirHandle) {
            try {
              var indexContent = IndexRegenerator.generate(App._notes);
              await FolderScanner._atomicWrite(App._dirHandle, '_index.md', indexContent);
            } catch (writeErr) {
              App.announce(STRINGS.indexWriteFail);
            }
          }
        },

        _showApp: function () {
          document.getElementById('landing').classList.add('hidden');
          document.getElementById('app').classList.remove('hidden');
        },

        _scanAndRender: async function () {
          var noteView = document.getElementById('note-view');
          noteView.textContent = '';
          var loadingP = document.createElement('p');
          loadingP.className = 'loading';
          loadingP.textContent = STRINGS.loading;
          noteView.appendChild(loadingP);

          var result = await FolderScanner.scan(App._dirHandle);
          if (!result) return;

          App._notes = result.notes;
          App._brokenNotes = result.brokenNotes;
          App._conflictFiles = result.conflictFiles;

          // Build title index
          App._titleIndex = new Map();
          for (var i = 0; i < App._notes.length; i++) {
            var note = App._notes[i];
            var key = WikiLinkResolver._normalize(note.frontmatter.title);
            // If duplicate, store array indicator
            if (App._titleIndex.has(key)) {
              var existing = App._titleIndex.get(key);
              if (!Array.isArray(existing)) {
                App._titleIndex.set(key, [existing, note]);
              } else {
                existing.push(note);
              }
            } else {
              App._titleIndex.set(key, note);
            }
          }

          // Build backlink graph
          App._backlinkGraph = BacklinkGraph.build(App._notes);

          // Scan SRS cards
          await App._scanSRSCards();

          // Render
          App._renderNoteList();
          App._renderBrokenPanel();
          App._renderConflictPanel();

          // Show first note or empty state
          if (App._notes.length > 0) {
            App.showNote(App._notes[0].path);
          } else {
            noteView.textContent = '';
            var emptyP = document.createElement('p');
            emptyP.className = 'empty-state';
            emptyP.textContent = STRINGS.noNotes;
            noteView.appendChild(emptyP);
          }

          // Announce counts
          var announcement = STRINGS.notesCount(App._notes.length);
          if (App._brokenNotes.length > 0) {
            announcement += ', ' + App._brokenNotes.length + ' broken';
          }
          if (App._conflictFiles.length > 0) {
            announcement += ', ' + App._conflictFiles.length + ' conflicts';
          }
          App.announce(announcement);
        },

        _renderNoteList: function () {
          var listEl = document.getElementById('note-list');
          listEl.textContent = '';

          var filtered = App._notes.filter(function (n) {
            if (App._currentFilter === 'all') return true;
            return n.frontmatter.tier === App._currentFilter;
          });

          document.getElementById('notes-count').textContent = STRINGS.notesCount(filtered.length);

          for (var i = 0; i < filtered.length; i++) {
            var note = filtered[i];
            var btn = document.createElement('button');
            btn.className = 'note-list-item';
            btn.setAttribute('role', 'option');
            if (note.path === App._currentNotePath) {
              btn.classList.add('active');
              btn.setAttribute('aria-selected', 'true');
            }
            btn.textContent = note.frontmatter.title;

            var badge = document.createElement('span');
            badge.className = 'tier-badge';
            badge.textContent = note.frontmatter.tier;
            btn.appendChild(badge);

            (function (path) {
              btn.addEventListener('click', function () {
                App.showNote(path);
              });
            })(note.path);

            listEl.appendChild(btn);
          }
        },

        showNote: function (path) {
          App._currentNotePath = path;
          var note = App._notes.find(function (n) {
            return n.path === path;
          });
          if (!note) return;

          var noteView = document.getElementById('note-view');
          noteView.textContent = '';

          // Note title
          var titleEl = document.createElement('h1');
          titleEl.textContent = note.frontmatter.title;
          noteView.appendChild(titleEl);

          // Metadata
          var metaDiv = document.createElement('div');
          metaDiv.className = 'note-meta';

          var tierTag = document.createElement('span');
          tierTag.className = 'tag';
          tierTag.textContent = note.frontmatter.tier;
          metaDiv.appendChild(tierTag);

          if (Array.isArray(note.frontmatter.tags)) {
            for (var t = 0; t < note.frontmatter.tags.length; t++) {
              var tagSpan = document.createElement('span');
              tagSpan.className = 'tag';
              tagSpan.textContent = note.frontmatter.tags[t];
              metaDiv.appendChild(tagSpan);
            }
          }

          var dateSpan = document.createElement('span');
          dateSpan.className = 'meta-date';
          var updatedStr = note.frontmatter.updated || '';
          try {
            dateSpan.textContent =
              'Updated: ' +
              new Intl.DateTimeFormat(undefined, { year: 'numeric', month: 'short', day: 'numeric' }).format(
                new Date(updatedStr)
              );
          } catch (e) {
            dateSpan.textContent = 'Updated: ' + updatedStr.substring(0, 10);
          }
          metaDiv.appendChild(dateSpan);

          noteView.appendChild(metaDiv);

          // Render markdown body
          var bodyDiv = document.createElement('div');
          bodyDiv.className = 'note-body';

          // Create resolver for this note
          var resolver = WikiLinkResolver.create(App._titleIndex, note.frontmatter.title);
          var rendered = MarkdownParser.parse(note.body, resolver);
          bodyDiv.appendChild(rendered);
          noteView.appendChild(bodyDiv);

          // Update backlinks panel
          App._renderBacklinks(path);

          // Update active state in list
          App._renderNoteList();
        },

        _renderBacklinks: function (path) {
          var listEl = document.getElementById('backlink-list');
          listEl.textContent = '';

          var backlinks = App._backlinkGraph ? App._backlinkGraph.get(path) || [] : [];

          if (backlinks.length === 0) {
            var li = document.createElement('li');
            li.textContent = STRINGS.noBacklinks;
            li.style.color = 'var(--color-text-muted)';
            li.style.fontSize = '0.85rem';
            listEl.appendChild(li);
            return;
          }

          for (var i = 0; i < backlinks.length; i++) {
            var bl = backlinks[i];
            var li2 = document.createElement('li');
            var a = document.createElement('a');
            a.setAttribute('href', '#');
            a.textContent = bl.title;
            (function (p) {
              a.addEventListener('click', function (e) {
                e.preventDefault();
                App.showNote(p);
              });
            })(bl.path);
            li2.appendChild(a);
            listEl.appendChild(li2);
          }
        },

        _renderBrokenPanel: function () {
          var panel = document.getElementById('broken-panel');
          panel.textContent = '';

          if (App._brokenNotes.length === 0) {
            panel.classList.add('hidden');
            return;
          }

          panel.classList.remove('hidden');
          var h3 = document.createElement('h3');
          h3.textContent = STRINGS.brokenTitle + ' (' + App._brokenNotes.length + ')';
          panel.appendChild(h3);

          var ul = document.createElement('ul');
          for (var i = 0; i < App._brokenNotes.length; i++) {
            var bn = App._brokenNotes[i];
            var li = document.createElement('li');
            var pathSpan = document.createElement('strong');
            pathSpan.textContent = bn.path;
            li.appendChild(pathSpan);

            for (var j = 0; j < bn.errors.length; j++) {
              var errSpan = document.createElement('div');
              errSpan.className = 'error-detail';
              errSpan.textContent = bn.errors[j].field
                ? bn.errors[j].field + ': ' + bn.errors[j].message
                : bn.errors[j].message;
              li.appendChild(errSpan);
            }
            ul.appendChild(li);
          }
          panel.appendChild(ul);
        },

        _renderConflictPanel: function () {
          var panel = document.getElementById('conflict-panel');
          panel.textContent = '';

          if (App._conflictFiles.length === 0) {
            panel.classList.add('hidden');
            return;
          }

          panel.classList.remove('hidden');
          var h3 = document.createElement('h3');
          h3.textContent = STRINGS.conflictTitle + ' (' + App._conflictFiles.length + ')';
          panel.appendChild(h3);

          var ul = document.createElement('ul');
          for (var i = 0; i < App._conflictFiles.length; i++) {
            var cf = App._conflictFiles[i];
            var li = document.createElement('li');
            var nameSpan = document.createElement('strong');
            nameSpan.textContent = cf.path;
            li.appendChild(nameSpan);
            var msgSpan = document.createElement('span');
            msgSpan.textContent = ' \u2014 ' + STRINGS.conflictMsg;
            li.appendChild(msgSpan);
            ul.appendChild(li);
          }
          panel.appendChild(ul);
        },

        // ── SRS scanning ─────────────────────────────

        _scanSRSCards: async function () {
          App._cards = [];
          App._brokenCards = [];

          try {
            App._srsHandle = await App._dirHandle.getDirectoryHandle('srs');
          } catch (e) {
            // No srs folder
            App._updateDueBadge();
            return;
          }

          // Clean up orphan temps
          await App._cleanupOrphanTemps(App._srsHandle);

          for await (var entry of App._srsHandle.values()) {
            if (entry.kind !== 'file' || !entry.name.endsWith('.yaml')) continue;
            if (entry.name.startsWith('.')) continue;

            var filePath = 'srs/' + entry.name;

            // SharePoint conflict detection
            if (FolderScanner._conflictPattern.test(entry.name)) {
              App._brokenCards.push({
                path: filePath,
                errors: [
                  { path: filePath, kind: 'conflict', field: '', message: STRINGS.conflictMsg, recoverable: true },
                ],
              });
              continue;
            }

            var content;
            try {
              var file = await entry.getFile();
              content = await file.text();
              var parsed = SRSCardParser.parse(content, filePath);
              if (parsed.errors.length > 0) {
                App._brokenCards.push({ path: filePath, errors: parsed.errors });
              } else {
                parsed.card._mtime = file.lastModified;
                parsed.card._path = filePath;
                App._cards.push(parsed.card);
              }
            } catch (ioErr) {
              App._brokenCards.push({
                path: filePath,
                errors: [
                  { path: filePath, kind: 'io', field: '', message: ioErr.message || 'io error', recoverable: true },
                ],
              });
            }
          }

          App._updateDueBadge();
          App._renderBrokenCardsPanel();
        },

        _updateDueBadge: function () {
          var btn = document.getElementById('btn-review');
          // Remove existing badge
          var existing = btn.querySelector('.due-badge');
          if (existing) existing.remove();

          var dueCount = ReviewQueueBuilder.build(App._cards).length;
          var badge = document.createElement('span');
          badge.className = 'due-badge' + (dueCount === 0 ? ' none' : '');
          badge.textContent = STRINGS.dueCount(dueCount);
          btn.appendChild(badge);
        },

        _cleanupOrphanTemps: async function (dirHandle) {
          try {
            for await (var entry of dirHandle.values()) {
              if (entry.kind === 'file' && entry.name.startsWith('.') && entry.name.endsWith('.tmp')) {
                try {
                  var file = await entry.getFile();
                  var age = Date.now() - file.lastModified;
                  if (age > 3600000) {
                    await dirHandle.removeEntry(entry.name);
                  }
                } catch (e) {}
              }
            }
          } catch (e) {}
        },

        // ── View switching ──────────────────────────

        _toggleView: function (view) {
          if (App._currentView === view) {
            App._currentView = 'notes';
          } else {
            App._currentView = view;
          }
          App._syncViewVisibility();
          if (App._currentView === 'outline') App._renderOutline();
          if (App._currentView === 'ingest') App._renderIngest();
        },

        _syncViewVisibility: function () {
          var noteView = document.getElementById('note-view');
          var reviewView = document.getElementById('review-view');
          var outlineView = document.getElementById('outline-view');
          var ingestView = document.getElementById('ingest-view');
          var aside = document.querySelector('.aside-panel');

          noteView.classList.toggle('hidden', App._currentView !== 'notes');
          reviewView.classList.toggle('hidden', App._currentView !== 'review');
          outlineView.classList.toggle('hidden', App._currentView !== 'outline');
          ingestView.classList.toggle('hidden', App._currentView !== 'ingest');
          if (aside) aside.classList.toggle('hidden', App._currentView !== 'notes');
        },

        // ── Multi-section import (M3) ───────────────
        // Scaffold only. Parses pastes via SectionDelimiterParser and
        // renders a preview. Commit / writer / collision handling lands in
        // a follow-up commit; the button is present but disabled here.
        // Every DOM node is built via createElement + textContent +
        // setAttribute. Zero innerHTML/outerHTML/insertAdjacentHTML.

        _ingestScaffoldRendered: false,
        _ingestLastResult: null,

        _renderIngest: function () {
          if (App._ingestScaffoldRendered) return;
          var view = document.getElementById('ingest-view');
          view.textContent = '';

          var container = document.createElement('div');
          container.className = 'ingest-container';

          var header = document.createElement('div');
          header.className = 'ingest-header';
          var h = document.createElement('h2');
          h.textContent = STRINGS.ingestTitle;
          var desc = document.createElement('p');
          desc.className = 'ingest-desc';
          desc.textContent = STRINGS.ingestDesc;
          header.appendChild(h);
          header.appendChild(desc);
          container.appendChild(header);

          var textareaWrap = document.createElement('div');
          textareaWrap.className = 'ingest-textarea-wrap';
          var label = document.createElement('label');
          label.setAttribute('for', 'ingest-textarea');
          label.textContent = STRINGS.ingestTextareaLabel;
          var textarea = document.createElement('textarea');
          textarea.id = 'ingest-textarea';
          textarea.className = 'ingest-textarea';
          textarea.setAttribute('spellcheck', 'false');
          textarea.setAttribute('autocomplete', 'off');
          textarea.setAttribute('autocorrect', 'off');
          textarea.setAttribute('autocapitalize', 'off');
          textarea.setAttribute('placeholder', STRINGS.ingestTextareaPlaceholder);
          textareaWrap.appendChild(label);
          textareaWrap.appendChild(textarea);
          container.appendChild(textareaWrap);

          var actions = document.createElement('div');
          actions.className = 'ingest-actions';

          var parseBtn = document.createElement('button');
          parseBtn.type = 'button';
          parseBtn.className = 'primary';
          parseBtn.id = 'ingest-parse';
          parseBtn.textContent = STRINGS.ingestParse;
          parseBtn.addEventListener('click', App._onParseIngest);

          var clearBtn = document.createElement('button');
          clearBtn.type = 'button';
          clearBtn.id = 'ingest-clear';
          clearBtn.textContent = STRINGS.ingestClear;
          clearBtn.addEventListener('click', App._onClearIngest);

          var commitBtn = document.createElement('button');
          commitBtn.type = 'button';
          commitBtn.id = 'ingest-commit';
          commitBtn.className = 'primary';
          commitBtn.textContent = STRINGS.ingestCommitNoop;
          commitBtn.disabled = true;
          commitBtn.addEventListener('click', App._onCommitIngest);

          actions.appendChild(parseBtn);
          actions.appendChild(clearBtn);
          actions.appendChild(commitBtn);

          var stats = document.createElement('div');
          stats.id = 'ingest-stats';
          stats.className = 'ingest-stats';
          actions.appendChild(stats);

          container.appendChild(actions);

          var resultsMount = document.createElement('div');
          resultsMount.id = 'ingest-results';
          container.appendChild(resultsMount);

          view.appendChild(container);
          App._ingestScaffoldRendered = true;
        },

        _onClearIngest: function () {
          var textarea = document.getElementById('ingest-textarea');
          if (textarea) textarea.value = '';
          var results = document.getElementById('ingest-results');
          if (results) results.textContent = '';
          var stats = document.getElementById('ingest-stats');
          if (stats) stats.textContent = '';
          App._ingestLastResult = null;
          App._ingestRowModels = [];
          App._ingestCorpusSnapshot = null;
          App._ingestUpdateCommitButton();
        },

        _onParseIngest: async function () {
          var textarea = document.getElementById('ingest-textarea');
          var results = document.getElementById('ingest-results');
          var stats = document.getElementById('ingest-stats');
          if (!textarea || !results) return;

          results.textContent = '';
          if (stats) stats.textContent = '';
          App._ingestRowModels = [];
          App._ingestUpdateCommitButton();

          var paste = textarea.value;
          if (paste.length === 0) {
            App._renderIngestEmptyState(results, STRINGS.ingestEmptyPaste);
            App.announce(STRINGS.ingestEmptyPaste);
            return;
          }

          App.announce(STRINGS.ingestParseStarted);
          var result = SectionDelimiterParser.parse(paste);
          App._ingestLastResult = result;
          App._renderIngestStats(stats, result);
          App._renderIngestPreview(results, result);

          var fatalErrors = (result.errors || []).filter(function (e) {
            return e.fatal;
          });
          if (fatalErrors.length > 0) {
            var first = fatalErrors[0];
            App.announce(STRINGS.ingestParseFailedWithCategory(first.category, first.line || 0));
            return;
          }
          if (result.stats && result.stats.zeroSections) {
            App.announce(STRINGS.ingestZeroSections);
            return;
          }

          App.announce(STRINGS.ingestParseComplete(result.sections.length));

          // Kick off a corpus scan so the preview can show collisions now.
          // Only meaningful when we have a writable directory handle —
          // drag-drop (read-only) mode skips this; the commit button will
          // surface the read-only reason.
          if (App._isWritable && App._dirHandle) {
            try {
              App._ingestCorpusSnapshot = await FolderScanner.listTierFilenames(App._dirHandle);
              App._ingestReEvaluateAllRows();
            } catch (e) {
              App._ingestCorpusSnapshot = null;
              App._ingestReEvaluateAllRows();
              App.announce(STRINGS.ingestPreScanFailed(App._ingestMapWriteError(e).kind));
            }
          } else {
            App._ingestCorpusSnapshot = null;
            App._ingestReEvaluateAllRows();
          }
        },

        _onCommitIngest: async function () {
          if (App._ingestIsWriting) return; // double-click guard
          if (!App._isWritable || !App._dirHandle) {
            App.announce(STRINGS.ingestReadOnlyMode);
            return;
          }
          var models = App._ingestRowModels || [];
          if (models.length === 0) return;

          // Reset stale cancelled-overwrite skips so a second Commit click
          // re-prompts for each overwrite. Rows with intent==='skip' stay
          // skipped (they're filtered out of the write queue below); rows
          // with writeResult.kind==='skipped' represent a prior cancelled
          // overwrite and should come back around.
          for (var clr = 0; clr < models.length; clr++) {
            if (models[clr].writeResult && models[clr].writeResult.kind === 'skipped') {
              models[clr].writeResult = null;
              App._ingestRenderRowDynamicSlots(models[clr]);
            }
          }

          App._ingestIsWriting = true;
          App._ingestUpdateCommitButton();

          // Pre-commit rescan (case-insensitive). Per round-5 bugs persona:
          // this is the defense against SharePoint-sync-introduced files
          // appearing between parse-time and commit-time.
          App.announce(STRINGS.ingestPreScanStarted);
          try {
            App._ingestCorpusSnapshot = await FolderScanner.listTierFilenames(App._dirHandle);
          } catch (e) {
            App._ingestIsWriting = false;
            var mapped = App._ingestMapWriteError(e);
            App.announce(STRINGS.ingestPreScanFailed(mapped.kind));
            App._ingestUpdateCommitButton();
            return;
          }
          // Snapshot any newly-appeared collisions before writing.
          App._ingestReEvaluateAllRows();
          var newCollisions = models.filter(function (m) {
            return m.collision && !(m.writeResult && m.writeResult.ok) && m.intent === 'write';
          });
          if (newCollisions.length > 0) {
            App._ingestIsWriting = false;
            App._ingestUpdateCommitButton();
            App.announce(STRINGS.ingestPreScanComplete(newCollisions.length));
            return;
          }
          App.announce(STRINGS.ingestPreScanComplete(0));

          // Build the write queue: rows that should be attempted this commit.
          // Includes (a) rows never attempted, (b) previously-failed rows
          // (bulk-retry is built into the same Commit click per plan
          // §"Retry all failed"). Excludes rows already-succeeded or with
          // intent='skip'. Blocked rows (unresolved collision, empty slug,
          // parse errors) are also excluded — the commit button should not
          // be enabled with blocked rows, but we filter defensively.
          var queue = models.filter(function (m) {
            if (m.writeResult && m.writeResult.ok) return false;
            if (m.intent === 'skip') return false;
            if (App._ingestHasBlockingIssues(m)) return false;
            return true;
          });

          // Confirmation pass: any overwrite rows need explicit OK. This
          // loop serializes the modal so the user confirms one at a time
          // and can cancel mid-batch without losing the already-confirmed.
          for (var c = 0; c < queue.length; c++) {
            var m = queue[c];
            if (m.intent === 'overwrite') {
              var slug = App._ingestCurrentSlug(m);
              var tier = App._ingestCurrentTier(m);
              var existing = m.collision && m.collision.kind === 'corpus' ? m.collision.existingName : slug + '.md';
              var ok = await App._ingestConfirmOverwrite(tier + '/' + existing);
              if (!ok) {
                // User cancelled → mark row as skipped so we don't silently
                // drop it from the retry flow.
                m.writeResult = { ok: false, kind: 'skipped' };
                App._ingestRenderRowDynamicSlots(m);
              }
            }
          }

          // Write loop: serialized to preserve aria-live ordering and to
          // keep failure handling simple. Each file is atomic via the
          // existing FolderScanner._atomicWrite. Rows whose intent was
          // overwrite-then-cancelled have already had writeResult set to
          // kind='skipped' in the confirmation pass above; those are
          // excluded from `writable` here.
          var okCount = 0;
          var failedCount = 0;
          var skippedCount = 0;
          var writable = queue.filter(function (x) {
            return !(x.writeResult && x.writeResult.kind === 'skipped');
          });
          for (var i = 0; i < writable.length; i++) {
            var row = writable[i];
            App.announce(STRINGS.ingestWriteRowStart(i + 1, writable.length));
            var res = await App._ingestWriteOne(row);
            row.writeResult = res;
            App._ingestRenderRowDynamicSlots(row);
            if (res.ok) okCount++;
            else if (res.kind === 'skipped') skippedCount++;
            else failedCount++;
          }

          // Count cancelled-overwrite rows that never entered the write loop.
          for (var k = 0; k < queue.length; k++) {
            if (queue[k].writeResult && queue[k].writeResult.kind === 'skipped' && writable.indexOf(queue[k]) === -1) {
              skippedCount++;
            }
          }

          App._ingestIsWriting = false;
          App._ingestUpdateCommitButton();
          App.announce(STRINGS.ingestWriteComplete(okCount, failedCount, skippedCount));

          // Offer _index.md regeneration as an explicit affordance (plan
          // §"Post-commit. A link/button to trigger _index.md regeneration
          // is surfaced; not auto-run").
          if (okCount > 0) App._ingestShowRegenerateIndexButton();
        },

        _ingestWriteOne: async function (model) {
          var slug = App._ingestCurrentSlug(model);
          var tier = App._ingestCurrentTier(model);
          if (slug === null) {
            return { ok: false, kind: 'empty-slug', filename: '(unknown)', tier: tier };
          }
          var filename = slug + '.md';

          // Compose the file content: frontmatter + body. Frontmatter gets
          // the effective title + tier (user edits win over agent output),
          // plus created/updated timestamps from the OS clock (never from
          // an LLM, per data_schemas.md) and any other fields the agent
          // emitted (tags, etc.).
          var fm = Object.assign({}, model.section.frontmatter || {});
          fm.title = App._ingestCurrentTitle(model);
          fm.tier = tier;
          var now = new Date().toISOString().replace(/\.\d{3}Z$/, 'Z');
          if (!fm.created) fm.created = now;
          fm.updated = now;
          if (!fm.tags) fm.tags = [];
          var content = App._ingestSerializeNote(fm, model.section.body);

          try {
            var tierHandle = await App._dirHandle.getDirectoryHandle(tier, { create: true });
            await FolderScanner._atomicWrite(tierHandle, filename, content);
            return { ok: true, filename: filename, tier: tier };
          } catch (e) {
            var mapped = App._ingestMapWriteError(e);
            return {
              ok: false,
              kind: mapped.kind,
              filename: filename,
              tier: tier,
              rawName: e && e.name ? e.name : 'Error',
            };
          }
        },

        _ingestRetryRow: async function (model) {
          if (App._ingestIsWriting) return;
          App._ingestIsWriting = true;
          App._ingestUpdateCommitButton();
          App.announce(STRINGS.ingestWriteRowStart(1, 1));
          var res = await App._ingestWriteOne(model);
          model.writeResult = res;
          App._ingestRenderRowDynamicSlots(model);
          App._ingestIsWriting = false;
          App._ingestUpdateCommitButton();
          App.announce(
            res.ok
              ? STRINGS.ingestRowWritten(res.tier, res.filename)
              : STRINGS.ingestRowFailed(res.tier || '?', res.filename || '?', res.kind || '?')
          );
        },

        _ingestMapWriteError: function (e) {
          var name = e && e.name ? e.name : '';
          if (name === 'NotAllowedError') return { kind: STRINGS.ingestWriteErrorPermDenied };
          if (name === 'InvalidStateError' || name === 'NotFoundError') {
            // NotFoundError on a dir handle typically means the handle is
            // stale (folder moved/renamed) or permission was revoked.
            return { kind: STRINGS.ingestWriteErrorRevoked };
          }
          if (name === 'QuotaExceededError') return { kind: STRINGS.ingestWriteErrorQuota };
          if (name === 'TypeMismatchError') return { kind: STRINGS.ingestWriteErrorExists };
          if (name === 'NotReadableError') return { kind: STRINGS.ingestWriteErrorIO };
          return { kind: STRINGS.ingestWriteErrorIO };
        },

        _ingestSerializeNote: function (frontmatter, body) {
          // Serialize a flat-YAML frontmatter block matching FrontmatterParser's
          // reader. Quoted scalars only for strings containing : or starting
          // with a YAML-special char; arrays use flow syntax. Trusts the
          // caller to have validated control bytes beforehand.
          var lines = ['---'];
          var orderedKeys = ['title', 'tier', 'created', 'updated', 'tags'];
          var seen = {};
          for (var i = 0; i < orderedKeys.length; i++) {
            var k = orderedKeys[i];
            if (Object.prototype.hasOwnProperty.call(frontmatter, k)) {
              lines.push(k + ': ' + App._ingestSerializeYamlValue(frontmatter[k]));
              seen[k] = true;
            }
          }
          var fmKeys = Object.keys(frontmatter);
          for (var j = 0; j < fmKeys.length; j++) {
            var fk = fmKeys[j];
            if (seen[fk]) continue;
            lines.push(fk + ': ' + App._ingestSerializeYamlValue(frontmatter[fk]));
          }
          lines.push('---');
          lines.push('');
          return lines.join('\n') + body + (body.endsWith('\n') ? '' : '\n');
        },

        _ingestSerializeYamlValue: function (v) {
          if (Array.isArray(v)) {
            return '[' + v.map(App._ingestSerializeYamlValue).join(', ') + ']';
          }
          if (typeof v === 'number' || typeof v === 'boolean') return String(v);
          if (v === null || v === undefined) return '';
          var s = String(v);
          // Quote if starts with YAML-special or contains a colon-space
          if (/^[\s'"[{&*!|>%@`]/.test(s) || /:\s/.test(s) || /#/.test(s)) {
            return '"' + s.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"';
          }
          return s;
        },

        _ingestConfirmOverwrite: function (targetPath) {
          return new Promise(function (resolve) {
            var dialog = document.getElementById('ingest-confirm-overwrite');
            var title = document.getElementById('ingest-confirm-title');
            var body = document.getElementById('ingest-confirm-body');
            var yesBtn = document.getElementById('ingest-confirm-yes');
            var noBtn = document.getElementById('ingest-confirm-no');
            if (!dialog || !dialog.showModal) {
              // Browser without <dialog> support — fall back to window.confirm.
              // Not expected on modern Edge/Chrome but keeps the promise contract.
              resolve(window.confirm(STRINGS.ingestConfirmOverwriteBody(targetPath)));
              return;
            }
            title.textContent = STRINGS.ingestConfirmOverwriteTitle;
            body.textContent = STRINGS.ingestConfirmOverwriteBody(targetPath);
            yesBtn.textContent = STRINGS.ingestConfirmOverwriteYes;
            noBtn.textContent = STRINGS.ingestConfirmOverwriteNo;

            function cleanup(result) {
              yesBtn.removeEventListener('click', onYes);
              noBtn.removeEventListener('click', onNo);
              dialog.removeEventListener('cancel', onCancel);
              if (dialog.open) dialog.close();
              resolve(result);
            }
            function onYes() {
              cleanup(true);
            }
            function onNo() {
              cleanup(false);
            }
            function onCancel(ev) {
              ev.preventDefault();
              cleanup(false);
            }
            yesBtn.addEventListener('click', onYes);
            noBtn.addEventListener('click', onNo);
            dialog.addEventListener('cancel', onCancel);
            dialog.showModal();
            // Focus "No" (the safe default) for keyboard accessibility.
            noBtn.focus();
          });
        },

        _ingestShowRegenerateIndexButton: function () {
          var results = document.getElementById('ingest-results');
          if (!results) return;
          if (document.getElementById('ingest-regen-index')) return; // already shown
          var wrap = document.createElement('div');
          wrap.className = 'ingest-regen-wrap';
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.id = 'ingest-regen-index';
          btn.textContent = STRINGS.ingestRegenIndex;
          btn.addEventListener('click', App._ingestRegenerateIndex);
          wrap.appendChild(btn);
          results.appendChild(wrap);
        },

        _ingestRegenerateIndex: async function () {
          if (!App._isWritable || !App._dirHandle) {
            App.announce(STRINGS.indexSkipped);
            return;
          }
          try {
            // Refresh notes list so new writes are included.
            var scanResult = await FolderScanner.scan(App._dirHandle);
            if (scanResult && scanResult.notes) App._notes = scanResult.notes;
            var indexContent = IndexRegenerator.generate(App._notes);
            await FolderScanner._atomicWrite(App._dirHandle, '_index.md', indexContent);
            App.announce(STRINGS.ingestRegenIndexDone);
          } catch (e) {
            App.announce(STRINGS.ingestRegenIndexFail);
          }
        },

        _renderIngestStats: function (mount, result) {
          if (!mount) return;
          var parts = [];
          if (result.stats) {
            if (result.stats.bomStripped) parts.push(STRINGS.ingestStatsBom);
            if (result.stats.lineEndingsNormalized) parts.push(STRINGS.ingestStatsLineEndings);
            if (result.stats.dedented) parts.push(STRINGS.ingestStatsDedented);
            if (result.stats.tooManySections) {
              parts.push(STRINGS.ingestStatsTooMany(result.stats.totalSections, SectionDelimiterParser.MAX_SECTIONS));
            }
          }
          mount.textContent = parts.join(' · ');
        },

        _renderIngestPreview: function (mount, result) {
          var fatalErrors = (result.errors || []).filter(function (e) {
            return e.fatal;
          });
          if (fatalErrors.length > 0) {
            App._renderIngestErrorBox(mount, fatalErrors);
            return;
          }

          if (result.stats && result.stats.zeroSections) {
            App._renderIngestEmptyState(mount, STRINGS.ingestZeroSections);
            return;
          }

          if ((result.warnings || []).length > 0) {
            App._renderIngestWarningsBox(mount, result.warnings);
          }

          App._renderIngestSectionList(mount, result.sections || []);
        },

        _renderIngestErrorBox: function (mount, errors) {
          var box = document.createElement('div');
          box.className = 'ingest-errors';
          box.setAttribute('role', 'alert');
          var h = document.createElement('h3');
          h.textContent = STRINGS.ingestErrorsHeading;
          box.appendChild(h);
          var ul = document.createElement('ul');
          for (var i = 0; i < errors.length; i++) {
            var li = document.createElement('li');
            li.textContent = STRINGS.ingestErrorLine(
              errors[i].category,
              errors[i].line || 0,
              errors[i].column || 0,
              errors[i].message || ''
            );
            ul.appendChild(li);
          }
          box.appendChild(ul);
          mount.appendChild(box);
        },

        _renderIngestWarningsBox: function (mount, warnings) {
          var box = document.createElement('div');
          box.className = 'ingest-warnings';
          box.setAttribute('role', 'status');
          var h = document.createElement('h3');
          h.textContent = STRINGS.ingestWarningsHeading;
          box.appendChild(h);
          var ul = document.createElement('ul');
          for (var i = 0; i < warnings.length; i++) {
            var li = document.createElement('li');
            li.textContent = STRINGS.ingestErrorLine(
              warnings[i].category,
              warnings[i].line || 0,
              warnings[i].column || 0,
              warnings[i].message || ''
            );
            ul.appendChild(li);
          }
          box.appendChild(ul);
          mount.appendChild(box);
        },

        _renderIngestEmptyState: function (mount, text) {
          var box = document.createElement('div');
          box.className = 'ingest-empty-state';
          box.textContent = text;
          mount.appendChild(box);
        },

        // Row model: one per parsed section. Holds the editable title/tier,
        // user-chosen intent (write/skip/rename/overwrite), derived collision
        // state, and per-row write result. Stored as App._ingestRowModels so
        // the commit flow can iterate them and the re-evaluation can update
        // all rows on any single-row change.
        _ingestRowModels: [],
        _ingestCorpusSnapshot: null,
        _ingestIsWriting: false,

        _renderIngestSectionList: function (mount, sections) {
          var h = document.createElement('h3');
          h.textContent = STRINGS.ingestSectionsHeading;
          mount.appendChild(h);

          var list = document.createElement('div');
          list.className = 'ingest-sections';

          App._ingestRowModels = [];
          for (var i = 0; i < sections.length; i++) {
            var model = App._ingestBuildRowModel(sections[i], i);
            App._ingestRowModels.push(model);
            list.appendChild(App._renderIngestSectionRow(model, sections.length));
          }
          mount.appendChild(list);

          // Initial evaluation — fills collision + intent slots now that all
          // rows exist (intra-paste collisions need the full set in hand).
          App._ingestReEvaluateAllRows();
        },

        _ingestBuildRowModel: function (section, index) {
          var fmTitle =
            section.frontmatter && typeof section.frontmatter.title === 'string' ? section.frontmatter.title : '';
          var fmTier =
            section.frontmatter && typeof section.frontmatter.tier === 'string' ? section.frontmatter.tier : 'warm';
          if (fmTier !== 'bedrock' && fmTier !== 'warm' && fmTier !== 'cold') {
            fmTier = 'warm';
          }
          return {
            index: index,
            section: section,
            initialTitle: fmTitle,
            initialTier: fmTier,
            // DOM handles — filled by _renderIngestSectionRow.
            titleInput: null,
            tierSelect: null,
            renameInput: null,
            collisionSlot: null,
            intentSlot: null,
            renameSlot: null,
            resultSlot: null,
            mismatchSlot: null,
            rowEl: null,
            // Live state.
            intent: 'write', // one of: 'write' | 'skip' | 'rename' | 'overwrite'
            renameTitle: '', // only used when intent === 'rename'
            collision: null, // null | { kind: 'corpus' | 'intra', existingName?, otherRowNum? }
            writeResult: null, // null | { ok: true, filename, tier } | { ok: false, kind, filename, tier }
          };
        },

        _ingestCurrentTitle: function (model) {
          if (model.intent === 'rename' && model.renameInput) {
            return model.renameInput.value;
          }
          return model.titleInput ? model.titleInput.value : model.initialTitle;
        },

        _ingestCurrentTier: function (model) {
          return model.tierSelect ? model.tierSelect.value : model.initialTier;
        },

        _ingestCurrentSlug: function (model) {
          return Slugger.slugify(App._ingestCurrentTitle(model));
        },

        _ingestHasBlockingIssues: function (model) {
          // Returns true if the row cannot be written as-is. Skipped rows
          // never block commit.
          if (model.intent === 'skip') return false;
          if (model.writeResult && model.writeResult.ok) return false;
          // Parse-time per-section errors = blocking
          if ((model.section.errors || []).length > 0) return true;
          // Edited title that normalizes empty = blocking
          if (App._ingestCurrentSlug(model) === null) return true;
          // Unresolved collision = blocking (must pick rename or overwrite)
          if (model.collision && model.intent === 'write') return true;
          return false;
        },

        _renderIngestSectionRow: function (model, totalRows) {
          var section = model.section;
          var index = model.index;

          var row = document.createElement('div');
          row.className = 'ingest-row';
          if ((section.errors || []).length > 0) row.classList.add('has-issues');
          model.rowEl = row;

          var head = document.createElement('div');
          head.className = 'ingest-row-head';

          // Title input
          var titleLabel = document.createElement('label');
          var titleId = 'ingest-row-title-' + index;
          titleLabel.setAttribute('for', titleId);
          titleLabel.appendChild(document.createTextNode(STRINGS.ingestRowTitleLabel));
          var titleInput = document.createElement('input');
          titleInput.type = 'text';
          titleInput.id = titleId;
          titleInput.value = model.initialTitle;
          titleInput.setAttribute('placeholder', STRINGS.ingestEmptyTitle);
          titleLabel.appendChild(titleInput);
          model.titleInput = titleInput;
          titleInput.addEventListener('input', function () {
            App._ingestReEvaluateAllRows();
          });

          // Tier select
          var tierLabel = document.createElement('label');
          var tierId = 'ingest-row-tier-' + index;
          tierLabel.setAttribute('for', tierId);
          tierLabel.appendChild(document.createTextNode(STRINGS.ingestRowTierLabel));
          var tierSelect = document.createElement('select');
          tierSelect.id = tierId;
          var tierOptions = [
            { value: 'bedrock', label: STRINGS.ingestTierLabelBedrock },
            { value: 'warm', label: STRINGS.ingestTierLabelWarm },
            { value: 'cold', label: STRINGS.ingestTierLabelCold },
          ];
          for (var t = 0; t < tierOptions.length; t++) {
            var opt = document.createElement('option');
            opt.value = tierOptions[t].value;
            opt.textContent = tierOptions[t].label;
            if (tierOptions[t].value === model.initialTier) opt.selected = true;
            tierSelect.appendChild(opt);
          }
          tierLabel.appendChild(tierSelect);
          model.tierSelect = tierSelect;
          tierSelect.addEventListener('change', function () {
            App._ingestReEvaluateAllRows();
          });

          // Slug display (read-only, live-updated by evaluator)
          var slugBlock = document.createElement('div');
          var slugLabel = document.createElement('div');
          slugLabel.style.fontSize = '0.75rem';
          slugLabel.style.fontWeight = '600';
          slugLabel.style.color = 'var(--color-text-muted)';
          slugLabel.textContent = STRINGS.ingestRowSlugLabel;
          var slugValue = document.createElement('div');
          slugValue.className = 'ingest-row-slug';
          slugValue.textContent = section.canonicalSlug || section.sentinelSlug;
          slugBlock.appendChild(slugLabel);
          slugBlock.appendChild(slugValue);
          model.slugValueEl = slugValue;

          // Expand toggle
          var expandBtn = document.createElement('button');
          expandBtn.type = 'button';
          expandBtn.className = 'ingest-row-expand';
          expandBtn.textContent = STRINGS.ingestRowExpand;
          expandBtn.setAttribute('aria-expanded', 'false');

          head.appendChild(titleLabel);
          head.appendChild(tierLabel);
          head.appendChild(slugBlock);
          head.appendChild(expandBtn);
          row.appendChild(head);

          // Slug-mismatch banner (parse-time only; disappears if user edits title)
          var mismatchSlot = document.createElement('div');
          mismatchSlot.className = 'ingest-row-mismatch';
          if (!(section.slugMismatch && section.canonicalSlug)) {
            mismatchSlot.classList.add('hidden');
          } else {
            mismatchSlot.textContent = STRINGS.ingestSlugMismatch(
              section.canonicalSlug,
              section.slugMismatchReason || ''
            );
          }
          row.appendChild(mismatchSlot);
          model.mismatchSlot = mismatchSlot;

          // Per-section issues (parse-time — static)
          if ((section.errors || []).length > 0) {
            var issues = document.createElement('div');
            issues.className = 'ingest-row-issues';
            var issuesH = document.createElement('div');
            issuesH.textContent = STRINGS.ingestRowIssuesHeading;
            issues.appendChild(issuesH);
            var issuesUl = document.createElement('ul');
            for (var k = 0; k < section.errors.length; k++) {
              var ei = section.errors[k];
              var ili = document.createElement('li');
              ili.textContent = STRINGS.ingestErrorLine(ei.category, ei.line || 0, ei.column || 0, ei.message || '');
              issuesUl.appendChild(ili);
            }
            issues.appendChild(issuesUl);
            row.appendChild(issues);
          }

          // Dynamic slots — filled by _ingestReEvaluateAllRows
          var collisionSlot = document.createElement('div');
          collisionSlot.classList.add('hidden');
          row.appendChild(collisionSlot);
          model.collisionSlot = collisionSlot;

          var intentSlot = document.createElement('div');
          intentSlot.classList.add('hidden');
          row.appendChild(intentSlot);
          model.intentSlot = intentSlot;

          var renameSlot = document.createElement('div');
          renameSlot.classList.add('hidden');
          row.appendChild(renameSlot);
          model.renameSlot = renameSlot;

          var resultSlot = document.createElement('div');
          resultSlot.classList.add('hidden');
          row.appendChild(resultSlot);
          model.resultSlot = resultSlot;

          // Collapsed body mount (rendered on expand)
          var bodyMount = document.createElement('div');
          bodyMount.className = 'ingest-row-body hidden';
          bodyMount.setAttribute('aria-hidden', 'true');
          row.appendChild(bodyMount);

          var bodyRendered = false;
          expandBtn.addEventListener('click', function () {
            var isHidden = bodyMount.classList.contains('hidden');
            if (isHidden && !bodyRendered) {
              bodyMount.textContent = '';
              if (section.body && section.body.length > 0) {
                var frag = MarkdownParser.parse(section.body, {
                  resolve: function () {
                    return null;
                  },
                });
                bodyMount.appendChild(frag);
              } else {
                var empty = document.createElement('em');
                empty.textContent = STRINGS.ingestEmptyBody;
                bodyMount.appendChild(empty);
              }
              bodyRendered = true;
            }
            bodyMount.classList.toggle('hidden', !isHidden);
            bodyMount.setAttribute('aria-hidden', isHidden ? 'false' : 'true');
            expandBtn.textContent = isHidden ? STRINGS.ingestRowCollapse : STRINGS.ingestRowExpand;
            expandBtn.setAttribute('aria-expanded', isHidden ? 'true' : 'false');
          });

          // totalRows is accepted for future use (e.g., row-count annotations in
          // collision messages); currently unused but kept to keep the signature
          // stable if we expand per-row rendering later.
          void totalRows;
          return row;
        },

        _ingestReEvaluateAllRows: function () {
          var models = App._ingestRowModels;
          if (!models || models.length === 0) return;

          // First pass: recompute effective slug + detect intra-paste collisions.
          // Group by (tier + slug). Any group with >1 row that's not skipped
          // and has a non-null slug is intra-colliding.
          var groups = {};
          for (var i = 0; i < models.length; i++) {
            var m = models[i];
            if (m.writeResult && m.writeResult.ok) continue; // already written
            if (m.intent === 'skip') continue;
            var slug = App._ingestCurrentSlug(m);
            if (slug === null) continue;
            var tier = App._ingestCurrentTier(m);
            var key = tier + '/' + slug;
            if (!groups[key]) groups[key] = [];
            groups[key].push(m);
          }

          // Second pass: assign collisions per row.
          for (var j = 0; j < models.length; j++) {
            var model = models[j];
            if (model.writeResult && model.writeResult.ok) {
              model.collision = null;
              App._ingestRenderRowDynamicSlots(model);
              continue;
            }
            var effSlug = App._ingestCurrentSlug(model);
            var effTier = App._ingestCurrentTier(model);
            // Update slug display live.
            if (model.slugValueEl) {
              model.slugValueEl.textContent = effSlug ? effSlug : STRINGS.ingestEmptySlugAfterEdit;
            }
            model.collision = null;

            // Intra-paste collision: same group has another non-skipped row.
            if (effSlug !== null && model.intent !== 'skip') {
              var grp = groups[effTier + '/' + effSlug];
              if (grp && grp.length > 1) {
                var other = grp.find(function (x) {
                  return x.index !== model.index;
                });
                if (other) {
                  model.collision = { kind: 'intra', otherRowNum: other.index + 1 };
                }
              }
            }

            // Corpus collision (case-insensitive): only checked if no intra
            // collision and the corpus snapshot exists.
            if (!model.collision && effSlug !== null && model.intent !== 'skip') {
              var snap = App._ingestCorpusSnapshot;
              if (snap && snap[effTier]) {
                var targetLower = (effSlug + '.md').toLowerCase();
                for (var n = 0; n < snap[effTier].length; n++) {
                  if (snap[effTier][n].toLowerCase() === targetLower) {
                    model.collision = { kind: 'corpus', existingName: snap[effTier][n] };
                    break;
                  }
                }
              }
            }

            // If user had set intent to rename/overwrite but no collision now
            // exists (e.g., they edited the title into uniqueness), reset to write.
            if (!model.collision && (model.intent === 'rename' || model.intent === 'overwrite')) {
              model.intent = 'write';
            }

            App._ingestRenderRowDynamicSlots(model);
          }

          App._ingestUpdateCommitButton();
        },

        _ingestRenderRowDynamicSlots: function (model) {
          var writeDone = model.writeResult !== null;
          var effSlug = App._ingestCurrentSlug(model);
          var effTier = App._ingestCurrentTier(model);

          // Collision slot
          if (writeDone || !model.collision) {
            model.collisionSlot.classList.add('hidden');
            model.collisionSlot.textContent = '';
          } else {
            model.collisionSlot.classList.remove('hidden');
            model.collisionSlot.className =
              'ingest-row-collision ' + (model.collision.kind === 'corpus' ? 'corpus' : 'intra');
            model.collisionSlot.textContent =
              model.collision.kind === 'corpus'
                ? STRINGS.ingestCollisionCorpus(model.collision.existingName)
                : STRINGS.ingestCollisionIntra(model.collision.otherRowNum);
          }

          // Intent slot — only visible when there's a collision or result is pending
          // and the row has blocking issues. For clean rows we hide it (write is default).
          if (writeDone) {
            model.intentSlot.classList.add('hidden');
            model.intentSlot.textContent = '';
          } else if (model.collision) {
            App._ingestRenderIntentSlot(model);
          } else if (effSlug === null && model.intent !== 'skip') {
            // Edited title → empty slug. Offer Skip (the only valid option).
            App._ingestRenderIntentSlot(model, /*forceSkipOnly=*/ true);
          } else {
            model.intentSlot.classList.add('hidden');
            model.intentSlot.textContent = '';
          }

          // Rename slot — only when intent === 'rename'
          if (!writeDone && model.intent === 'rename') {
            App._ingestRenderRenameSlot(model);
          } else {
            model.renameSlot.classList.add('hidden');
            model.renameSlot.textContent = '';
            model.renameInput = null;
          }

          // Result slot — shown post-write
          if (writeDone) {
            App._ingestRenderResultSlot(model);
          } else {
            model.resultSlot.classList.add('hidden');
            model.resultSlot.textContent = '';
          }

          // Mismatch banner — hide if user has edited the title (no longer meaningful)
          if (model.mismatchSlot && !model.mismatchSlot.classList.contains('hidden')) {
            var edited = model.titleInput && model.titleInput.value !== model.initialTitle;
            if (edited) model.mismatchSlot.classList.add('hidden');
          }

          // Row outline color update
          if (model.collision || App._ingestHasBlockingIssues(model)) {
            model.rowEl.classList.add('has-issues');
          } else {
            model.rowEl.classList.remove('has-issues');
          }

          // Suppress unused-binding warning (effTier is computed but only
          // referenced via the collision evaluator above).
          void effTier;
        },

        _ingestRenderIntentSlot: function (model, forceSkipOnly) {
          model.intentSlot.classList.remove('hidden');
          model.intentSlot.className = 'ingest-row-intent';
          model.intentSlot.textContent = '';

          var legend = document.createElement('span');
          legend.textContent = STRINGS.ingestIntentLegend;
          legend.style.fontWeight = '600';
          model.intentSlot.appendChild(legend);

          var options = forceSkipOnly
            ? [{ value: 'skip', label: STRINGS.ingestIntentSkip }]
            : [
                { value: 'write', label: STRINGS.ingestIntentWrite },
                { value: 'rename', label: STRINGS.ingestIntentRename },
                { value: 'overwrite', label: STRINGS.ingestIntentOverwrite },
                { value: 'skip', label: STRINGS.ingestIntentSkip },
              ];

          // If a collision exists and intent is still 'write', the row is
          // blocked; don't preselect 'write' — instead show none selected so
          // user must make a choice.
          for (var i = 0; i < options.length; i++) {
            var label = document.createElement('label');
            var radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'ingest-intent-' + model.index;
            radio.value = options[i].value;
            if (model.intent === options[i].value) radio.checked = true;
            // closure capture
            (function (valueCopy) {
              radio.addEventListener('change', function () {
                model.intent = valueCopy;
                App._ingestReEvaluateAllRows();
              });
            })(options[i].value);
            label.appendChild(radio);
            label.appendChild(document.createTextNode(' ' + options[i].label));
            model.intentSlot.appendChild(label);
          }
        },

        _ingestRenderRenameSlot: function (model) {
          model.renameSlot.classList.remove('hidden');
          model.renameSlot.className = 'ingest-row-rename';
          model.renameSlot.textContent = '';

          var label = document.createElement('label');
          var renameId = 'ingest-rename-' + model.index;
          label.setAttribute('for', renameId);
          label.textContent = 'New title:';
          label.style.fontWeight = '600';

          var input = document.createElement('input');
          input.type = 'text';
          input.id = renameId;
          input.value = model.renameTitle || model.titleInput.value;
          input.setAttribute('aria-describedby', 'ingest-rename-slug-' + model.index);

          var slugPreview = document.createElement('span');
          slugPreview.className = 'ingest-row-rename-slug';
          slugPreview.id = 'ingest-rename-slug-' + model.index;

          function updatePreview() {
            var s = Slugger.slugify(input.value);
            slugPreview.textContent = s ? '→ ' + s + '.md' : '→ (empty slug)';
          }
          updatePreview();

          input.addEventListener('input', function () {
            model.renameTitle = input.value;
            updatePreview();
            // The rename input shadows the title for slug derivation; trigger
            // a full re-eval so collision state updates live.
            App._ingestReEvaluateAllRows();
          });

          model.renameSlot.appendChild(label);
          model.renameSlot.appendChild(input);
          model.renameSlot.appendChild(slugPreview);
          model.renameInput = input;
        },

        _ingestRenderResultSlot: function (model) {
          model.resultSlot.className = 'ingest-row-result';
          model.resultSlot.textContent = '';

          if (!model.writeResult) {
            model.resultSlot.classList.add('hidden');
            return;
          }
          model.resultSlot.classList.remove('hidden');

          if (model.writeResult.ok) {
            model.resultSlot.classList.add('ok');
            var icon = document.createElement('span');
            icon.className = 'ingest-result-icon';
            icon.textContent = '✓';
            var msg = document.createElement('span');
            msg.textContent = STRINGS.ingestRowWritten(model.writeResult.tier, model.writeResult.filename);
            model.resultSlot.appendChild(icon);
            model.resultSlot.appendChild(msg);
          } else if (model.writeResult.kind === 'skipped') {
            model.resultSlot.classList.add('skipped');
            var sIcon = document.createElement('span');
            sIcon.className = 'ingest-result-icon';
            sIcon.textContent = '∅';
            var sMsg = document.createElement('span');
            sMsg.textContent = STRINGS.ingestRowSkipped;
            model.resultSlot.appendChild(sIcon);
            model.resultSlot.appendChild(sMsg);
          } else {
            model.resultSlot.classList.add('failed');
            var fIcon = document.createElement('span');
            fIcon.className = 'ingest-result-icon';
            fIcon.textContent = '✗';
            var fMsg = document.createElement('span');
            fMsg.textContent = STRINGS.ingestRowFailed(
              model.writeResult.tier,
              model.writeResult.filename,
              model.writeResult.kind
            );
            var retryBtn = document.createElement('button');
            retryBtn.type = 'button';
            retryBtn.textContent = STRINGS.ingestRowRetry;
            retryBtn.addEventListener('click', function () {
              App._ingestRetryRow(model);
            });
            model.resultSlot.appendChild(fIcon);
            model.resultSlot.appendChild(fMsg);
            model.resultSlot.appendChild(retryBtn);
          }
        },

        _ingestUpdateCommitButton: function () {
          var btn = document.getElementById('ingest-commit');
          if (!btn) return;
          var models = App._ingestRowModels || [];

          if (App._ingestIsWriting) {
            btn.disabled = true;
            btn.textContent = STRINGS.ingestCommitWriting;
            btn.setAttribute('aria-label', STRINGS.ingestCommitWriting);
            btn.removeAttribute('title');
            return;
          }

          if (!App._isWritable) {
            btn.disabled = true;
            btn.textContent = STRINGS.ingestCommitPending;
            btn.setAttribute('title', STRINGS.ingestReadOnlyMode);
            btn.setAttribute('aria-label', STRINGS.ingestReadOnlyMode);
            return;
          }

          // Writable rows: not already-succeeded, not intent='skip', not blocked.
          // Previously-failed rows are writable (bulk-retry is built into
          // the same Commit click per plan §"Retry all failed").
          var writable = models.filter(function (m) {
            if (m.writeResult && m.writeResult.ok) return false;
            if (m.intent === 'skip') return false;
            if (App._ingestHasBlockingIssues(m)) return false;
            return true;
          });
          var blocked = models.filter(function (m) {
            if (m.writeResult && m.writeResult.ok) return false;
            if (m.intent === 'skip') return false;
            return App._ingestHasBlockingIssues(m);
          });

          if (writable.length === 0) {
            btn.disabled = true;
            if (blocked.length > 0) {
              btn.textContent = STRINGS.ingestCommitBlockedTitle(blocked.length);
              btn.setAttribute('title', STRINGS.ingestCommitBlockedTitle(blocked.length));
              btn.setAttribute('aria-label', STRINGS.ingestCommitBlockedTitle(blocked.length));
            } else {
              btn.textContent = STRINGS.ingestCommitNoop;
              btn.setAttribute('title', STRINGS.ingestCommitNoop);
              btn.setAttribute('aria-label', STRINGS.ingestCommitNoop);
            }
            return;
          }

          btn.disabled = false;
          btn.textContent = STRINGS.ingestCommitReady(writable.length);
          if (blocked.length > 0) {
            btn.setAttribute('title', STRINGS.ingestCommitBlockedTitle(blocked.length));
          } else {
            btn.removeAttribute('title');
          }
          btn.setAttribute('aria-label', STRINGS.ingestCommitReady(writable.length));
        },

        // ── SRS Review mode ─────────────────────────

        _enterReview: function () {
          App._reviewQueue = ReviewQueueBuilder.build(App._cards);
          App._reviewIndex = 0;
          App._reviewStats = { again: 0, hard: 0, good: 0, easy: 0 };
          App._currentView = 'review';
          App._syncViewVisibility();
          App._renderReviewCard();
        },

        _renderReviewCard: function () {
          var view = document.getElementById('review-view');
          view.textContent = '';

          var container = document.createElement('div');
          container.className = 'review-container';

          // Disclaimer
          var disclaimer = document.createElement('div');
          disclaimer.className = 'review-disclaimer';
          disclaimer.textContent = STRINGS.sharepointDisclaimer;
          container.appendChild(disclaimer);

          if (App._reviewQueue.length === 0) {
            var msg = document.createElement('p');
            msg.className = 'empty-state';
            msg.textContent = App._cards.length === 0 ? STRINGS.noCards : STRINGS.noCardsDue;
            container.appendChild(msg);
            view.appendChild(container);
            return;
          }

          if (App._reviewIndex >= App._reviewQueue.length) {
            App._renderReviewSummary(container);
            view.appendChild(container);
            return;
          }

          var card = App._reviewQueue[App._reviewIndex];

          // Progress
          var progress = document.createElement('div');
          progress.className = 'review-progress';
          progress.textContent = 'Card ' + (App._reviewIndex + 1) + ' of ' + App._reviewQueue.length;
          container.appendChild(progress);

          // Card
          var cardDiv = document.createElement('div');
          cardDiv.className = 'review-card';

          var qLabel = document.createElement('div');
          qLabel.className = 'question-label';
          qLabel.textContent = 'Question';
          cardDiv.appendChild(qLabel);

          var qText = document.createElement('div');
          qText.className = 'question-text';
          qText.textContent = card.question;
          cardDiv.appendChild(qText);

          // Answer section (hidden initially)
          var ansSection = document.createElement('div');
          ansSection.className = 'answer-section hidden';
          ansSection.id = 'answer-section';

          var aLabel = document.createElement('div');
          aLabel.className = 'answer-label';
          aLabel.textContent = 'Answer';
          ansSection.appendChild(aLabel);

          var aText = document.createElement('div');
          aText.className = 'answer-text';
          aText.textContent = card.answer;
          ansSection.appendChild(aText);

          // Rating buttons
          var actions = document.createElement('div');
          actions.className = 'review-actions';
          actions.id = 'rating-actions';

          var ratings = [
            { label: STRINGS.again, cls: 'again', value: 0, key: '1', stat: 'again' },
            { label: STRINGS.hard, cls: 'hard', value: 3, key: '2', stat: 'hard' },
            { label: STRINGS.good, cls: 'good', value: 4, key: '3', stat: 'good' },
            { label: STRINGS.easy, cls: 'easy', value: 5, key: '4', stat: 'easy' },
          ];

          for (var i = 0; i < ratings.length; i++) {
            var r = ratings[i];
            var btn = document.createElement('button');
            btn.className = r.cls;
            btn.textContent = r.label;
            btn.type = 'button';
            (function (rating, statKey) {
              btn.addEventListener('click', function () {
                App._rateCard(rating, statKey);
              });
            })(r.value, r.stat);
            actions.appendChild(btn);
          }
          ansSection.appendChild(actions);
          cardDiv.appendChild(ansSection);
          container.appendChild(cardDiv);

          // Show answer button
          var showBtn = document.createElement('button');
          showBtn.className = 'primary';
          showBtn.textContent = STRINGS.showAnswer;
          showBtn.type = 'button';
          showBtn.id = 'btn-show-answer';
          showBtn.addEventListener('click', function () {
            ansSection.classList.remove('hidden');
            showBtn.classList.add('hidden');
            // Focus first rating button
            var firstRating = actions.querySelector('button');
            if (firstRating) firstRating.focus();
          });
          container.appendChild(showBtn);

          // Error banner area
          var errorBanner = document.createElement('div');
          errorBanner.id = 'review-error';
          errorBanner.className = 'review-error hidden';
          errorBanner.setAttribute('role', 'alert');
          container.appendChild(errorBanner);

          // End review button
          var endBtn = document.createElement('button');
          endBtn.textContent = STRINGS.endReview;
          endBtn.type = 'button';
          endBtn.style.marginTop = '1rem';
          endBtn.addEventListener('click', function () {
            App._reviewIndex = App._reviewQueue.length;
            App._renderReviewCard();
          });
          container.appendChild(endBtn);

          view.appendChild(container);

          // Keyboard shortcuts
          App._reviewKeyHandler = function (e) {
            if (ansSection.classList.contains('hidden')) {
              if (e.key === ' ' || e.key === 'Enter') {
                showBtn.click();
                e.preventDefault();
              }
              return;
            }
            if (App._isWritingCard) return;
            if (e.key === '1') App._rateCard(0, 'again');
            else if (e.key === '2') App._rateCard(3, 'hard');
            else if (e.key === '3') App._rateCard(4, 'good');
            else if (e.key === '4') App._rateCard(5, 'easy');
          };
          document.addEventListener('keydown', App._reviewKeyHandler);
        },

        _rateCard: async function (rating, statKey) {
          if (App._isWritingCard) return;
          App._isWritingCard = true;

          // Disable all rating buttons
          var buttons = document.querySelectorAll('#rating-actions button');
          buttons.forEach(function (b) {
            b.disabled = true;
          });

          var card = App._reviewQueue[App._reviewIndex];
          var result = SM2Scheduler.compute(card, rating);

          // Update card in-memory
          card.ease = result.ease;
          card.interval = result.interval;
          card.next_review = result.next_review;
          card.last_reviewed = result.last_reviewed;

          // Write atomically
          var errorBanner = document.getElementById('review-error');
          try {
            if (App._srsHandle && App._isWritable) {
              await SRSCardWriter.write(App._srsHandle, card, card._mtime);
              // Update mtime
              try {
                var updatedFile = await (await App._srsHandle.getFileHandle(card.id + '.yaml')).getFile();
                card._mtime = updatedFile.lastModified;
              } catch (e) {}
            }

            App._reviewStats[statKey]++;
            App._reviewIndex++;

            // Remove keyboard handler before re-render
            if (App._reviewKeyHandler) {
              document.removeEventListener('keydown', App._reviewKeyHandler);
            }

            App._isWritingCard = false;
            App._renderReviewCard();
          } catch (err) {
            App._isWritingCard = false;
            buttons.forEach(function (b) {
              b.disabled = false;
            });

            if (err.name === 'StaleWriteError') {
              // Try to re-read
              errorBanner.textContent = STRINGS.cardStaleWrite;
              errorBanner.classList.remove('hidden');
              try {
                var rereadHandle = await App._srsHandle.getFileHandle(card.id + '.yaml');
                var rereadFile = await rereadHandle.getFile();
                var rereadContent = await rereadFile.text();
                var reparsed = SRSCardParser.parse(rereadContent, card._path);
                if (reparsed.card) {
                  // Replace in queue
                  reparsed.card._mtime = rereadFile.lastModified;
                  reparsed.card._path = card._path;
                  App._reviewQueue[App._reviewIndex] = reparsed.card;
                  setTimeout(function () {
                    errorBanner.classList.add('hidden');
                    App._renderReviewCard();
                  }, 1500);
                }
              } catch (rereadErr) {
                errorBanner.textContent = STRINGS.cardStaleReloadFail;
                App._reviewStats[statKey]++;
                App._reviewIndex++;
                setTimeout(function () {
                  errorBanner.classList.add('hidden');
                  App._renderReviewCard();
                }, 2000);
              }
            } else {
              errorBanner.textContent = err.message || STRINGS.cardSaveFail;
              errorBanner.classList.remove('hidden');
            }
          }
        },

        _renderReviewSummary: function (container) {
          // Remove keyboard handler
          if (App._reviewKeyHandler) {
            document.removeEventListener('keydown', App._reviewKeyHandler);
          }

          var summary = document.createElement('div');
          summary.className = 'review-summary';

          var h2 = document.createElement('h2');
          h2.textContent = 'Review complete';
          summary.appendChild(h2);

          var total = App._reviewStats.again + App._reviewStats.hard + App._reviewStats.good + App._reviewStats.easy;
          var p = document.createElement('p');
          p.textContent = STRINGS.reviewSummary(
            total,
            App._reviewStats.again,
            App._reviewStats.hard,
            App._reviewStats.good,
            App._reviewStats.easy
          );
          summary.appendChild(p);

          var backBtn = document.createElement('button');
          backBtn.className = 'primary';
          backBtn.textContent = STRINGS.backToNotes;
          backBtn.type = 'button';
          backBtn.addEventListener('click', function () {
            App._currentView = 'notes';
            App._syncViewVisibility();
            App._updateDueBadge();
          });
          summary.appendChild(backBtn);

          container.appendChild(summary);
        },

        _renderBrokenCardsPanel: function () {
          var panel = document.getElementById('broken-cards-panel');
          panel.textContent = '';

          if (App._brokenCards.length === 0) {
            panel.classList.add('hidden');
            return;
          }

          panel.classList.remove('hidden');
          var h3 = document.createElement('h3');
          h3.textContent = STRINGS.brokenCards + ' (' + App._brokenCards.length + ')';
          panel.appendChild(h3);

          var ul = document.createElement('ul');
          for (var i = 0; i < App._brokenCards.length; i++) {
            var bc = App._brokenCards[i];
            var li = document.createElement('li');
            var pathSpan = document.createElement('strong');
            pathSpan.textContent = bc.path;
            li.appendChild(pathSpan);
            for (var j = 0; j < bc.errors.length; j++) {
              var errDiv = document.createElement('div');
              errDiv.className = 'error-detail';
              errDiv.textContent = bc.errors[j].field
                ? bc.errors[j].field + ': ' + bc.errors[j].message
                : bc.errors[j].message;
              li.appendChild(errDiv);
            }
            ul.appendChild(li);
          }
          panel.appendChild(ul);
        },

        // ── Outline view ────────────────────────────

        _renderOutline: function () {
          var view = document.getElementById('outline-view');
          view.textContent = '';

          var container = document.createElement('div');
          container.className = 'outline-container';

          var h2 = document.createElement('h2');
          h2.textContent = STRINGS.outlineTitle;
          container.appendChild(h2);

          if (App._notes.length === 0) {
            var empty = document.createElement('p');
            empty.className = 'empty-state';
            empty.textContent = STRINGS.outlineEmpty;
            container.appendChild(empty);
            view.appendChild(container);
            return;
          }

          // Group by tier
          var tiers = ['bedrock', 'warm', 'cold'];
          for (var t = 0; t < tiers.length; t++) {
            var tierName = tiers[t];
            var tierNotes = App._notes.filter(function (n) {
              return n.frontmatter.tier === tierName;
            });
            if (tierNotes.length === 0) continue;

            var section = document.createElement('div');
            section.className = 'outline-tier-section';

            // Collapsible header
            var header = document.createElement('button');
            header.className = 'outline-tier-header';
            header.type = 'button';
            header.setAttribute('aria-expanded', 'true');

            var chevron = document.createElement('span');
            chevron.className = 'chevron';
            chevron.textContent = '\u25BC';
            header.appendChild(chevron);

            var tierLabel = document.createTextNode(
              tierName.charAt(0).toUpperCase() + tierName.slice(1) + ' (' + tierNotes.length + ')'
            );
            header.appendChild(tierLabel);

            var noteList = document.createElement('ul');
            noteList.className = 'outline-note-list';

            header.addEventListener(
              'click',
              (function (list, hdr) {
                return function () {
                  var expanded = hdr.getAttribute('aria-expanded') === 'true';
                  hdr.setAttribute('aria-expanded', String(!expanded));
                  list.classList.toggle('hidden', expanded);
                };
              })(noteList, header)
            );

            section.appendChild(header);

            // Notes in this tier
            for (var n = 0; n < tierNotes.length; n++) {
              var note = tierNotes[n];
              var li = document.createElement('li');
              li.className = 'outline-note-item';

              var noteLink = document.createElement('a');
              noteLink.className = 'outline-note-link';
              noteLink.href = '#';
              noteLink.textContent = note.frontmatter.title;
              (function (path) {
                noteLink.addEventListener('click', function (e) {
                  e.preventDefault();
                  App._currentView = 'notes';
                  App._syncViewVisibility();
                  App.showNote(path);
                });
              })(note.path);
              li.appendChild(noteLink);

              // Sub-links
              if (note.wikiLinks && note.wikiLinks.length > 0) {
                var subUl = document.createElement('ul');
                subUl.className = 'outline-sub-links';
                for (var k = 0; k < note.wikiLinks.length; k++) {
                  var subLi = document.createElement('li');
                  var linkTitle = note.wikiLinks[k];
                  var normalizedLink = WikiLinkResolver._normalize(linkTitle);

                  // Try to resolve
                  var targetNote = null;
                  if (App._titleIndex) {
                    var found = App._titleIndex.get(normalizedLink);
                    if (found && !Array.isArray(found)) targetNote = found;
                  }

                  if (targetNote) {
                    var subA = document.createElement('a');
                    subA.href = '#';
                    subA.textContent = '\u2192 ' + linkTitle;
                    (function (p) {
                      subA.addEventListener('click', function (e) {
                        e.preventDefault();
                        App._currentView = 'notes';
                        App._syncViewVisibility();
                        App.showNote(p);
                      });
                    })(targetNote.path);
                    subLi.appendChild(subA);
                  } else {
                    subLi.textContent = '\u2192 ' + linkTitle + ' (broken)';
                  }
                  subUl.appendChild(subLi);
                }
                li.appendChild(subUl);
              }

              noteList.appendChild(li);
            }

            section.appendChild(noteList);
            container.appendChild(section);
          }

          // Back button
          var backBtn = document.createElement('button');
          backBtn.textContent = STRINGS.backToNotes;
          backBtn.type = 'button';
          backBtn.style.marginTop = '1rem';
          backBtn.addEventListener('click', function () {
            App._currentView = 'notes';
            App._syncViewVisibility();
          });
          container.appendChild(backBtn);

          view.appendChild(container);
        },

        announce: function (msg) {
          var el = document.getElementById('announcements');
          el.textContent = msg;
        },
      };

      // ── Boot ──────────────────────────────────────
      document.addEventListener('DOMContentLoaded', App.init);
    </script>
  </body>
</html>
