name: Harness Drift Check

# Weekly read-only verification that this repo's harness layout matches the
# canonical topology emitted by harness-cli. Catches when a workflow file or
# persona has been edited without a corresponding template update — or when
# the template has moved forward and this repo hasn't.
#
# On drift: opens (or updates) a single tracking issue with the report.
# Manual run: workflow_dispatch.
#
# Pinning: HARNESS_VERSION below pins the canonical version this repo
# compares itself against. Bump it deliberately when you want to upgrade
# this repo to a newer harness release.
#
# === SECURITY NOTE ===
# This workflow clones an external repo (`Anguijm/harness-cli`) and runs
# its `harness check` command. Trust posture and mitigations:
#
# - Maintainer: same human (@Anguijm) who maintains this repo. Self-trust;
#   not a third-party dependency.
# - Pin: SHA-pinned via `ref: ${{ env.HARNESS_SHA }}` below — the tag
#   `HARNESS_VERSION` is the human-readable label, but the cryptographic
#   pin is the SHA. A force-pushed tag with no SHA bump cannot reach
#   this workflow.
# - Blast radius: drift-check executes harness-cli's CLI in a CI sandbox
#   to read template files and compare against this repo's tree. It does
#   NOT execute consumer-repo code in the harness-cli runtime, modify
#   this repo's working tree, or call external APIs.
# - Permissions: scoped below to `contents: read` + `issues: write`
#   (least privilege — the only mutation is opening / commenting on a
#   tracking issue when drift is detected).
# - Action pins: `actions/checkout` and `actions/setup-node` are
#   SHA-pinned via the comments below to specific tags, not floating
#   refs.
# - Removal cost: delete this file. Consumer repo loses weekly drift
#   verification but suffers no functional regression.

env:
  # The harness-cli release tag this repo is pinned to.
  # Bump deliberately; see https://github.com/Anguijm/harness-cli/releases.
  # IMPORTANT: HARNESS_VERSION and HARNESS_SHA must be bumped TOGETHER
  # (one is the human-readable label, the other is the cryptographic
  # pin). An out-of-sync pair will report a misleading version label
  # in any drift-detected issue and is the staleness pattern the bugs
  # persona flagged on PR #15 R1.
  HARNESS_VERSION: V0.3.0
  HARNESS_SHA: 519a3f5fd1474c8f24d188b298c60bad1f62ca76

on:
  schedule:
    # Mondays at 14:00 UTC.
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    # 5 min is generous for a job that should take < 1 min on a normal run
    # (`actions/checkout` × 2 + `setup-node` + `npm ci` + a single
    # `harness check` invocation). The timeout guards against:
    #   - npm registry slowness or transient outage during `npm ci`
    #   - GitHub clone slowness when fetching the harness-cli repo
    #   - a future regression in `harness check` that hangs (e.g., on a
    #     symlinked path or pathological glob)
    # If you see runs hitting this ceiling, the right fix is usually
    # caching `node_modules` rather than raising the timeout.
    timeout-minutes: 5
    steps:
      - name: Checkout this repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Checkout harness-cli (canonical topology source)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          repository: Anguijm/harness-cli
          # Pin to immutable SHA, not tag (tag could theoretically be force-pushed).
          # HARNESS_VERSION above is the human-readable label for the same release.
          ref: ${{ env.HARNESS_SHA }}
          path: .harness-cli-canonical

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'

      - name: Install harness-cli deps
        working-directory: .harness-cli-canonical
        run: npm ci

      - name: Run drift check
        id: check
        run: |
          set +e
          node .harness-cli-canonical/src/cli.js check --verbose > drift.txt 2>&1
          STATUS=$?
          set -e
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          cat drift.txt
          if [ "$STATUS" -ne 0 ]; then
            {
              echo "## Harness drift detected"
              echo
              echo "Pinned to harness-cli **${{ env.HARNESS_VERSION }}**."
              echo
              echo '```'
              cat drift.txt
              echo '```'
              echo
              echo "**Missing files:** run \`harness init --update\` from a checkout of [Anguijm/harness-cli@${{ env.HARNESS_VERSION }}](https://github.com/Anguijm/harness-cli/tree/${{ env.HARNESS_VERSION }}) to add them."
              echo
              echo "**Modified files:** these may be intentional repo-specific customizations or stale copies of an older canonical version. Review manually."
              echo
              echo "**To upgrade to a newer harness release:** bump \`HARNESS_VERSION\` in \`.github/workflows/drift-check.yml\`, then re-run this workflow. See https://github.com/Anguijm/harness-cli/releases."
            } > issue-body.md
          fi

      - name: Open or update tracking issue
        if: steps.check.outputs.status != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          TITLE="Harness drift: $(date -u +%Y-%m-%d)"
          EXISTING=$(gh issue list --repo "$REPO" --label "harness-drift" --state open --limit 1 --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            gh issue comment "$EXISTING" --repo "$REPO" --body-file issue-body.md
            echo "Commented on existing drift issue #$EXISTING."
          else
            gh label create harness-drift --repo "$REPO" --color "ededed" --description "Drift between repo and canonical harness topology" 2>/dev/null || true
            gh issue create --repo "$REPO" --title "$TITLE" --label "harness-drift" --body-file issue-body.md
          fi
